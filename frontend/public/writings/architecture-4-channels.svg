<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2D6A4F" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" rx="16" fill="#FAFAF8" stroke="#E5E3DE" stroke-width="1" />

  <!-- Title -->
  <text x="400" y="36" font-family="monospace" font-size="12" fill="#888888" text-anchor="middle" letter-spacing="0.06em">ONE SOURCE OF TRUTH · FOUR DELIVERY CHANNELS</text>

  <!-- Top: React Component Tree -->
  <rect x="270" y="56" width="260" height="44" rx="10" fill="#FFFFFF" stroke="#D0D0D0" stroke-width="1.2" />
  <text x="400" y="72" font-family="monospace" font-size="10" fill="#999999" text-anchor="middle">Your app — any components, any styling</text>
  <text x="400" y="87" font-family="monospace" font-size="12" fill="#1A1A1A" text-anchor="middle" font-weight="500">React Component Tree</text>

  <!-- Arrow down -->
  <line x1="400" y1="100" x2="400" y2="136" stroke="#2D6A4F" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Middle: useSemantic() + SemanticStore -->
  <rect x="250" y="138" width="300" height="48" rx="10" fill="#F0FDF4" stroke="#2D6A4F" stroke-width="1.5" />
  <text x="400" y="158" font-family="monospace" font-size="13" fill="#2D6A4F" text-anchor="middle" font-weight="500">useSemantic() → SemanticStore</text>
  <text x="400" y="175" font-family="monospace" font-size="9" fill="#6B7280" text-anchor="middle">collects · mirrors · serves</text>

  <!-- Four arrows fanning out -->
  <line x1="295" y1="186" x2="130" y2="240" stroke="#2D6A4F" stroke-width="1" stroke-opacity="0.4" marker-end="url(#arrow)" />
  <line x1="360" y1="186" x2="310" y2="240" stroke="#2D6A4F" stroke-width="1" stroke-opacity="0.4" marker-end="url(#arrow)" />
  <line x1="440" y1="186" x2="490" y2="240" stroke="#2D6A4F" stroke-width="1" stroke-opacity="0.4" marker-end="url(#arrow)" />
  <line x1="505" y1="186" x2="670" y2="240" stroke="#2D6A4F" stroke-width="1" stroke-opacity="0.4" marker-end="url(#arrow)" />

  <!-- Channel 1: JSON-LD -->
  <rect x="50" y="244" width="160" height="56" rx="10" fill="#FFFFFF" stroke="#D0D0D0" stroke-width="1" />
  <text x="130" y="268" font-family="monospace" font-size="12" fill="#1A1A1A" text-anchor="middle" font-weight="500">toJsonLd()</text>
  <text x="130" y="288" font-family="monospace" font-size="9" fill="#6B7280" text-anchor="middle">&lt;script&gt; in &lt;head&gt;</text>

  <!-- Channel 2: llms.txt -->
  <rect x="230" y="244" width="160" height="56" rx="10" fill="#FFFFFF" stroke="#D0D0D0" stroke-width="1" />
  <text x="310" y="268" font-family="monospace" font-size="12" fill="#1A1A1A" text-anchor="middle" font-weight="500">toLlmsTxt()</text>
  <text x="310" y="288" font-family="monospace" font-size="9" fill="#6B7280" text-anchor="middle">/llms.txt endpoint</text>

  <!-- Channel 3: Plain Text DOM -->
  <rect x="410" y="244" width="160" height="56" rx="10" fill="#FFFFFF" stroke="#D0D0D0" stroke-width="1" />
  <text x="490" y="268" font-family="monospace" font-size="12" fill="#1A1A1A" text-anchor="middle" font-weight="500">toPlainText()</text>
  <text x="490" y="288" font-family="monospace" font-size="9" fill="#6B7280" text-anchor="middle">hidden DOM node</text>

  <!-- Channel 4: window.__semant (highlighted) -->
  <rect x="590" y="244" width="160" height="56" rx="10" fill="#F0FDF4" stroke="#2D6A4F" stroke-width="1.5" />
  <text x="670" y="268" font-family="monospace" font-size="12" fill="#2D6A4F" text-anchor="middle" font-weight="500">window.__semant</text>
  <text x="670" y="288" font-family="monospace" font-size="9" fill="#6B7280" text-anchor="middle">getState() + execute()</text>

  <!-- Consumer labels -->
  <text x="130" y="326" font-family="sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Google · Bing</text>
  <text x="130" y="340" font-family="sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">AI Overviews</text>

  <text x="310" y="326" font-family="sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Perplexity · ClaudeBot</text>
  <text x="310" y="340" font-family="sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">GPTBot</text>

  <text x="490" y="326" font-family="sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Browser extensions</text>
  <text x="490" y="340" font-family="sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">Sandboxed agents</text>

  <text x="670" y="326" font-family="sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle" font-weight="500">Claude in Chrome</text>
  <text x="670" y="340" font-family="sans-serif" font-size="10" fill="#2D6A4F" text-anchor="middle" font-weight="500">Operator · Any JS agent</text>

  <!-- Strongest path note -->
  <text x="670" y="362" font-family="monospace" font-size="8" fill="#2D6A4F" text-anchor="middle" opacity="0.6">← strongest path (read + write)</text>
</svg>