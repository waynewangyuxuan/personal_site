    <tspan x="32" y="224" fill="#3B6EA5">          style</tspan><tspan fill="#6B7280">={{ background: c }}</tspan>
    <tspan x="32" y="244" fill="#6B7280">        /&gt;</tspan>
    <tspan x="32" y="264" fill="#6B7280">      ))}</tspan>
    <tspan x="32" y="284" fill="#6B7280">    &lt;/</tspan><tspan fill="#C0514A">div</tspan><tspan fill="#6B7280">&gt;)</tspan>
    <tspan x="32" y="304" fill="#6B7280">}</tspan>
  </text>

