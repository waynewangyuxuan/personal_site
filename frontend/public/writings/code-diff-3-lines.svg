    <tspan x="32" y="124" fill="#7B5BB5">  return</tspan><tspan fill="#6B7280"> (</tspan>
    <tspan x="32" y="144" fill="#6B7280">    &lt;</tspan><tspan fill="#C0514A">div</tspan><tspan fill="#6B7280">&gt;</tspan>
    <tspan x="32" y="164" fill="#6B7280">      {colors.</tspan><tspan fill="#2D6A4F">map</tspan><tspan fill="#6B7280">(c =&gt; (</tspan>
