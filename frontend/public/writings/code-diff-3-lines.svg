    <tspan x="460" y="162" fill="#2D6A4F">+     type: "color", value: color, set: onChange }]</tspan>
  </text>

  <text font-family="monospace" font-size="11.5">
    <tspan x="460" y="182" fill="#6B7280">  })</tspan>
    <tspan x="460" y="202" fill="#7B5BB5">  return</tspan><tspan fill="#6B7280"> (</tspan>
    <tspan x="460" y="222" fill="#6B7280">    &lt;</tspan><tspan fill="#C0514A">div</tspan><tspan fill="#6B7280">&gt;</tspan>
    <tspan x="460" y="242" fill="#6B7280">      {colors.</tspan><tspan fill="#2D6A4F">map</tspan><tspan fill="#6B7280">(c =&gt; (...))}</tspan>
    <tspan x="460" y="262" fill="#6B7280">    &lt;/</tspan><tspan fill="#C0514A">div</tspan><tspan fill="#6B7280">&gt;)</tspan>
    <tspan x="460" y="282" fill="#6B7280">}</tspan>
  </text>

